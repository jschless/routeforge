version: 1
profile: ccnp_v1
as_of: "2026-03-07"

levels:
  - MUST
  - SHOULD
  - OUT

scope:
  addressing: IPv4
  ipv6: IN_PHASE2
  ospf: OSPFv2
  bgp: BGP-4 IPv4 unicast

features:
  - id: L2_FRAME_VALIDATION
    domain: L2
    level: MUST
    description: Ethernet/IPv4 frame and header validation behavior.
    labs: [lab01_frame_and_headers]
    tests: [test_conformance_l2_frame_validation]
    checkpoints: [PARSE_OK, PARSE_DROP]

  - id: L2_MAC_LEARN_FWD
    domain: L2
    level: MUST
    description: MAC learning, unknown unicast flood, deterministic unicast forwarding.
    labs: [lab02_mac_learning_switch]
    tests: [test_conformance_l2_mac_learning]
    checkpoints: [MAC_LEARN, L2_FLOOD, L2_UNICAST_FORWARD]

  - id: L2_VLAN_TRUNK
    domain: L2
    level: MUST
    description: VLAN tagging/untagging and per-VLAN forwarding behavior.
    labs: [lab03_vlan_and_trunks]
    tests: [test_conformance_l2_vlan_trunk]
    checkpoints: [VLAN_CLASSIFY, VLAN_TAG_PUSH, VLAN_TAG_POP]

  - id: L2_STP_CORE
    domain: L2
    level: MUST
    description: STP deterministic root and port role/state behavior.
    labs: [lab04_stp]
    tests: [test_conformance_stp_core]
    checkpoints: [STP_ROOT_CHANGE, STP_PORT_ROLE_CHANGE]

  - id: L2_STP_PROTECTION
    domain: L2
    level: MUST
    description: Topology change handling and protection semantics.
    labs: [lab05_stp_convergence_and_protection]
    tests: [test_conformance_stp_protection]
    checkpoints: [STP_TOPOLOGY_CHANGE, STP_GUARD_ACTION]

  - id: L3_ARP_ADJ
    domain: L3
    level: MUST
    description: ARP resolution, cache updates, and pending queue behavior.
    labs: [lab06_arp_and_adjacency]
    tests: [test_conformance_l3_arp_adjacency]
    checkpoints: [ARP_REQUEST_TX, ARP_REPLY_RX, ARP_CACHE_UPDATE]

  - id: L3_RIB_LPM
    domain: L3
    level: MUST
    description: Connected/static route install and deterministic LPM selection.
    labs: [lab07_ipv4_subnet_and_rib]
    tests: [test_conformance_l3_rib_lpm]
    checkpoints: [RIB_ROUTE_INSTALL, ROUTE_LOOKUP, ROUTE_SELECT]

  - id: L3_FIB_FORWARD
    domain: L3
    level: MUST
    description: FIB forwarding pipeline with TTL decrement and drop reasons.
    labs: [lab08_fib_forwarding_pipeline]
    tests: [test_conformance_l3_fib_forward]
    checkpoints: [FIB_FORWARD, FIB_DROP, TTL_DECREMENT]

  - id: L3_ICMP_CONTROL
    domain: L3
    level: MUST
    description: ICMP echo, unreachable, and time-exceeded behavior.
    labs: [lab09_icmp_and_control_responses]
    tests: [test_conformance_l3_icmp_control]
    checkpoints: [ICMP_ECHO_REPLY, ICMP_UNREACHABLE, ICMP_TIME_EXCEEDED]

  - id: L3_DIAGNOSTICS
    domain: L3
    level: MUST
    description: Deterministic troubleshooting and explainability checkpoints.
    labs: [lab10_ipv4_control_plane_diagnostics]
    tests: [test_conformance_l3_diagnostics]
    checkpoints: [EXPLAIN_CHECKPOINT, DROP_REASON_ASSERT]

  - id: OSPF_NEIGHBOR_FSM
    domain: OSPF
    level: MUST
    description: OSPF neighbor state machine and timer behavior.
    labs: [lab11_ospf_adjacency_fsm]
    tests: [test_conformance_ospf_neighbor_fsm]
    checkpoints: [OSPF_HELLO_RX, OSPF_NEIGHBOR_CHANGE]

  - id: OSPF_NETTYPE_DRBDR
    domain: OSPF
    level: MUST
    description: OSPF network type behavior and DR/BDR election/failover.
    labs: [lab12_ospf_network_types_and_dr_bdr]
    tests: [test_conformance_ospf_dr_bdr]
    checkpoints: [OSPF_DR_ELECT, OSPF_BDR_ELECT, OSPF_DR_FAILOVER]

  - id: OSPF_LSDB_FLOOD_AGE
    domain: OSPF
    level: MUST
    description: LSA flooding, sequence handling, and aging in LSDB.
    labs: [lab13_ospf_lsa_flooding_and_lsdb]
    tests: [test_conformance_ospf_lsdb_flood_age]
    checkpoints: [OSPF_LSA_INSTALL, OSPF_LSA_REFRESH, OSPF_LSA_AGE_OUT]

  - id: OSPF_SPF_ROUTE_INSTALL
    domain: OSPF
    level: MUST
    description: Deterministic SPF, ECMP policy, and route installation.
    labs: [lab14_ospf_spf_and_route_install]
    tests: [test_conformance_ospf_spf_route_install]
    checkpoints: [OSPF_SPF_RUN, RIB_ROUTE_INSTALL]

  - id: OSPF_MULTI_AREA_ABR
    domain: OSPF
    level: MUST
    description: Multi-area behavior with ABR summary propagation.
    labs: [lab15_ospf_multi_area_abr]
    tests: [test_conformance_ospf_multi_area_abr]
    checkpoints: [OSPF_SUMMARY_ORIGINATE, OSPF_INTERAREA_ROUTE_INSTALL]

  - id: L4_TCP_UDP_FOUNDATIONS
    domain: L4
    level: MUST
    description: TCP/UDP parsing and TCP state behavior for flow-level reasoning.
    labs: [lab16_udp_tcp_fundamentals]
    tests: [test_conformance_l4_tcp_udp_foundations]
    checkpoints: [FLOW_CLASSIFY, TCP_STATE_CHANGE, UDP_VALIDATE]

  - id: BFD_SESSION_TIMERS
    domain: BFD
    level: MUST
    description: BFD session state and timeout behavior feeding control reactions.
    labs: [lab17_bfd_for_liveness]
    tests: [test_conformance_bfd_session_timers]
    checkpoints: [BFD_CONTROL_RX, BFD_STATE_CHANGE, BFD_TIMEOUT]

  - id: POLICY_ACL_ORDER
    domain: POLICY
    level: MUST
    description: ACL first-match ordered evaluation and implicit deny.
    labs: [lab18_acl_pipeline]
    tests: [test_conformance_policy_acl_order]
    checkpoints: [ACL_EVALUATE, ACL_PERMIT, ACL_DENY]

  - id: SERVICE_NAT44_STATE
    domain: SERVICE
    level: MUST
    description: Stateful NAT44 creation, reuse, return matching, and expiration.
    labs: [lab19_nat44_stateful_translation]
    tests: [test_conformance_service_nat44_state]
    checkpoints: [NAT_SESSION_CREATE, NAT_TRANSLATE_OUTBOUND, NAT_TRANSLATE_INBOUND, NAT_SESSION_EXPIRE]

  - id: SERVICE_QOS_MARK_QUEUE
    domain: SERVICE
    level: MUST
    description: Marking, queue admission, and deterministic dequeue behavior.
    labs: [lab20_qos_marking_and_queueing]
    tests: [test_conformance_service_qos_mark_queue]
    checkpoints: [QOS_REMARK, QOS_ENQUEUE, QOS_DEQUEUE]

  - id: BGP_SESSION_FSM
    domain: BGP
    level: MUST
    description: BGP session lifecycle and timer-driven reset behavior.
    labs: [lab21_bgp_session_fsm_and_transport]
    tests: [test_conformance_bgp_session_fsm]
    checkpoints: [BGP_SESSION_CHANGE, BGP_OPEN_RX]

  - id: BGP_BESTPATH
    domain: BGP
    level: MUST
    description: Deterministic best-path selection over core attributes/tie-breakers.
    labs: [lab22_bgp_attributes_and_bestpath]
    tests: [test_conformance_bgp_bestpath]
    checkpoints: [BGP_UPDATE_RX, BGP_BEST_PATH]

  - id: BGP_POLICY_FILTERS
    domain: BGP
    level: MUST
    description: Import/export controls with prefix, AS-path, and community policy.
    labs: [lab23_bgp_policy_and_filters]
    tests: [test_conformance_bgp_policy_filters]
    checkpoints: [BGP_POLICY_APPLY, BGP_UPDATE_EXPORT]

  - id: BGP_ROUTE_REFLECTION
    domain: BGP
    level: MUST
    description: Route-reflector behavior and deterministic convergence semantics.
    labs: [lab24_bgp_scaling_patterns]
    tests: [test_conformance_bgp_route_reflection]
    checkpoints: [BGP_RR_REFLECT, BGP_CONVERGENCE_MARK]

  - id: SERVICE_TUNNEL_IPSEC
    domain: SERVICE
    level: MUST
    description: Tunnel encapsulation/decapsulation and policy-driven IPsec outcomes.
    labs: [lab25_tunnels_and_ipsec]
    tests: [test_conformance_service_tunnel_ipsec]
    checkpoints: [ENCAP_PUSH, ENCAP_POP, IPSEC_POLICY_EVALUATE, IPSEC_SA_LOOKUP]

  - id: OPS_OBSERVABILITY
    domain: MGMT
    level: MUST
    description: Operational telemetry/readiness checks with deterministic outputs.
    labs: [lab26_observability_and_ops]
    tests: [test_conformance_ops_observability]
    checkpoints: [OPS_READINESS_CHECK, TELEMETRY_EMIT]

  - id: CAPSTONE_INCIDENT_RECOVERY
    domain: CAPSTONE
    level: MUST
    description: Scenario-driven multi-protocol failure/recovery and convergence assertions.
    labs: [lab27_capstone_incident_drill]
    tests: [test_conformance_capstone_incident_recovery]
    checkpoints: [SCENARIO_STEP_APPLY, CONVERGENCE_ASSERT]

  - id: SEC_DHCP_SNOOP_DAI
    domain: SECURITY
    level: MUST
    description: DHCP snooping binding learn and dynamic ARP inspection validation.
    labs: [lab28_dhcp_snooping_and_dai]
    tests: [test_conformance_sec_dhcp_snoop_dai]
    checkpoints: [DHCP_BINDING_LEARN, DAI_VALIDATE, DAI_DROP]

  - id: SEC_PORTSEC_IPSG
    domain: SECURITY
    level: MUST
    description: Port-security and IP source guard enforcement.
    labs: [lab29_port_security_and_ip_source_guard]
    tests: [test_conformance_sec_portsec_ipsg]
    checkpoints: [PORTSEC_LEARN, PORTSEC_VIOLATION, IPSG_DENY]

  - id: QOS_POLICE_SHAPE
    domain: QOS
    level: MUST
    description: QoS policing and shaping behavior.
    labs: [lab30_qos_policing_and_shaping]
    tests: [test_conformance_qos_police_shape]
    checkpoints: [QOS_POLICE, QOS_SHAPE_QUEUE, QOS_SHAPE_RELEASE]

  - id: QOS_WRED_CONGESTION
    domain: QOS
    level: MUST
    description: WRED and ECN behavior under congestion.
    labs: [lab31_qos_congestion_avoidance_wred]
    tests: [test_conformance_qos_wred]
    checkpoints: [QOS_WRED_PROFILE, QOS_ECN_MARK, QOS_WRED_DROP]

  - id: RT_REDIST_LOOP_GUARD
    domain: ROUTING
    level: MUST
    description: Route redistribution with loop-prevention tags.
    labs: [lab32_route_redistribution_and_loop_prevention]
    tests: [test_conformance_redist_loop_guard]
    checkpoints: [REDIST_IMPORT, TAG_SET, LOOP_SUPPRESS]

  - id: L3_FHRP_FAILOVER
    domain: ROUTING
    level: MUST
    description: FHRP active/standby failover with object tracking.
    labs: [lab33_fhrp_tracking_and_failover]
    tests: [test_conformance_fhrp_failover]
    checkpoints: [FHRP_ACTIVE_CHANGE, TRACK_DOWN, FHRP_PREEMPT]

  - id: IPV6_ND_SLAAC_GUARD
    domain: IPV6
    level: MUST
    description: IPv6 ND, SLAAC behavior, and RA guard enforcement.
    labs: [lab34_ipv6_nd_slaac_and_ra_guard]
    tests: [test_conformance_ipv6_nd_slaac_guard]
    checkpoints: [ND_NEIGHBOR_LEARN, SLAAC_PREFIX_APPLY, RA_GUARD_DROP]

  - id: OSPFV3_ADJ_LSDB
    domain: OSPF
    level: MUST
    description: OSPFv3 adjacency and LSDB behavior.
    labs: [lab35_ospfv3_adjacency_and_lsdb]
    tests: [test_conformance_ospfv3_adj_lsdb]
    checkpoints: [OSPFV3_HELLO_RX, OSPFV3_NEIGHBOR_FULL, OSPFV3_LSA_INSTALL]

  - id: BGP_MP_IPV6_UNICAST
    domain: BGP
    level: MUST
    description: MP-BGP IPv6 unicast route handling and best path.
    labs: [lab36_mpbgp_ipv6_unicast]
    tests: [test_conformance_bgp_mp_ipv6]
    checkpoints: [BGP_MP_UPDATE_RX, BGP_AF_SELECT, BGP_MP_BESTPATH]

  - id: MPLS_LDP_LFIB
    domain: MPLS
    level: MUST
    description: LDP label allocation and LFIB forwarding decisions.
    labs: [lab37_mpls_ldp_label_forwarding]
    tests: [test_conformance_mpls_ldp_lfib]
    checkpoints: [LDP_LABEL_ALLOC, LFIB_PROGRAM, MPLS_SWAP_FORWARD]

  - id: MPLS_L3VPN_VRF_RT
    domain: MPLS
    level: MUST
    description: VRF route-target import and VPNv4 resolution.
    labs: [lab38_l3vpn_vrf_and_route_targets]
    tests: [test_conformance_mpls_l3vpn_vrf_rt]
    checkpoints: [VRF_ROUTE_INSTALL, RT_IMPORT, VPNV4_RESOLVE]

  - id: EVPN_VXLAN_CONTROL
    domain: EVPN
    level: MUST
    description: EVPN type-2 learning and VNI-mapped MAC/IP install behavior.
    labs: [lab39_bgp_evpn_vxlan_basics]
    tests: [test_conformance_evpn_vxlan]
    checkpoints: [EVPN_TYPE2_LEARN, VNI_MAP_RESOLVE, EVPN_MAC_IP_INSTALL]

  - id: OSPF_AUTH_BASIC
    domain: OSPF
    level: SHOULD
    description: Deterministic OSPF authentication outcome modeling.
    labs: [lab15_ospf_multi_area_abr]
    tests: [test_conformance_ospf_auth_basic]
    checkpoints: [OSPF_AUTH_ACCEPT, OSPF_AUTH_REJECT]

  - id: BGP_MULTIPATH
    domain: BGP
    level: SHOULD
    description: Multipath route install where policy and tie-breaks allow.
    labs: [lab24_bgp_scaling_patterns]
    tests: [test_conformance_bgp_multipath]
    checkpoints: [BGP_MULTIPATH_SELECT]

  - id: IPV6_STACK
    domain: GLOBAL
    level: OUT
    description: IPv6 stack and IPv6 routing/control-plane behavior.
    labs: []
    tests: []
    checkpoints: []

  - id: MPLS_VRF_CORE
    domain: GLOBAL
    level: OUT
    description: MPLS and VRF feature set.
    labs: []
    tests: []
    checkpoints: []

  - id: BGP_EVPN
    domain: GLOBAL
    level: OUT
    description: EVPN and multi-AFI overlay control-plane behavior.
    labs: []
    tests: []
    checkpoints: []

